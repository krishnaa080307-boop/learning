<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML LISTS</title>
    <link rel="icon" href="../img/rk.jpg">
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">HTML LISTS</h1>
    <hr>
    <h>unordered list</h>
    <ul style="list-style: circle;">
        <li>tea</li>
        <li>coffee
            <ul style="list-style: disc;">
                <li>with sugar</li>
                <li>sugarless</li>
            </ul>
        </li>
        <li>water</li>
    </ul>
    <h>ordered list
    </h>
    <ol>
        <li>tea</li>
        <li>coffee</li>
        <li>water</li>
    </ol>
    <h>description list</h>
    <dl>
        <dt>coffee</dt>
        <dd>black hot drink</dd>
        <dt>milk</dt>
        <dd>white cold drink</dd>
    </dl>
</body>

</html>
