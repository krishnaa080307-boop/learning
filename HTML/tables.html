    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-radius: 10px;
            border-style: double;
            border-color: brown;
            padding: 15px;
            border-collapse: collapse;

        }

        th,
        td {
            background-color: aqua;
        }

        th {
            text-align: left;
        }

        table {
            border-spacing: 30px;
        }

        tr:nth-child(even) {
            background-color: blueviolet;
        }

        tr:hover {
            background-color: antiquewhite;
        }
    </style>
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
