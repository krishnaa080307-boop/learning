<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORMS</title>
    <link rel="icon" href="../img/w3s.png">
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">HTML FORMS</h1>
    <br>
    <h2>Example 1</h2>
    <form action="/action_page.php" method="get" autocomplete="on">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h2>Radio Buttons</h2>
    <p><b>Choose your favorite web languages:</b></p>
    <form>
        <input type="radio" id="html" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="css" name="fav_language" value="CSS">
        <label for="html">CSS</label><br>
        <input type="radio" id="javascript" name="fav_language" value="JAVASCRIPT">
        <label for="html">JAVASCRIPT</label><br>
    </form>
    <hr>
    <h2>CHECKBOXES</h2>
    <p><b>What does Shravan have:</b></p>
    <form action="#">
        <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
        <label for="vehicle1">He has a Bike</label><br>
        <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
        <label for="vehicle2">He has many cars</label><br>
        <input type="checkbox" id="vehicle3" name="vehicle3" value="Helicopter">
        <label for="vehicle3">He has a Helicopter</label><br>
        <input type="submit" value="Submit">
    </form>
    <hr>

</body>

</html>
