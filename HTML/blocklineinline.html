<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML BLOCKLINE & INLINE</title>
    <link rel="icon" href="../img/rk.jpg">
    <link rel="stylesheet" href="buttonstyle.css">
    <style>
        p,
        div {
            border: 1px solid black;
        }

        span {
            border: 3px solid red;
        }
    </style>
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">HTML BLOCKLINE & INLINE</h1>
    <hr>
    <h1 style="font-size: xx-large;">Block-level Elements</h1>
    <p>hello world</p>
    <div>hello world</div>
    <hr>
    <h1 style="font-size: xx-large;">Inline Elements</h1>
    <p style="border: none;">this is an inline span element:<span>hello world</span></p>
    <p style="border: none;">span element will not start in a new line</p>
    <hr>
</body>

</html>
