<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTRIBUTES FORMS</title>
    <link rel="icon" href="../img/rk.jpg">
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">ATTRIBUTES FORMS</h1>
    <hr>
    <h1 style="font-size: xx-large;">The Action Attribute</h1>
    <form action="/action_page.php">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1 style="font-size: xx-large;">The Target Attribute</h1>
    <form action="/action_page.php" target="_blank">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1 style="font-size: xx-large;">The Method Attribute</h1>
    <h1>Method= get</h1>
    <form action="/action_page.php" method="get">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1>Method= post</h1>
    <form action="/action_page.php" method="post">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1 style="font-size: xx-large;">The Autocomplete Attribute</h1>
    <form action="/action_page.php" method="get" autocomplete="on">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1 style="font-size: xx-large;">The Novalidate Attribute</h1>
    <form action="#" novalidate>
        <label for="email">Enter your email:</label>
        <input type="email" id="email" name="email"><br>
        <input type="submit">
    </form>
</body>

</html>
