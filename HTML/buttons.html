<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML BUTTONS</title>
    <link rel="icon" href="../img/rk.jpg">
    <style>
        .buttonstyle {
            background-color: #04AA6D;
            color: white;
            font-size: 15px;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .buttonstyle:hover {
            background-color: #059862;
        }
    </style>
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">HTML BUTTONS</h1>
    <hr>
    <button>click me</button>
    <button class="buttonstyle">green button</button>
    <hr>
    <h1 style="font-size: xx-large;">DISABLED BUTTONS</h1>
    <button disabled>disabled button</button>
    <hr>
    <h1 style="font-size: xx-large;">BUTTON TYPES</h1>
    <form action="#">
        First name: <input type="text" name="fname"><br><br>
        <button type="submit">submit Form</button>
        <button type="reset">reset Form</button>
    </form>
    <button type="button">button</button>

</body>

</html>
