<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML LINK COLORS</title>
    <link rel="icon" href="../img/rk.jpg">
    <style>
        a:link {
            color: green;
            background-color: transparent;
            text-decoration: none;
        }

        a:visited {
            color: pink;
            background-color: transparent;
            text-decoration: none;
        }

        a:hover {
            color: red;
            background-color: transparent;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
            background-color: transparent;
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="buttonstyle.css">
</head>

<body>
    <a href="../index.html"><button id="buttonstyle">BACK TO INDEX</button></a>
    <hr>
    <h1 style="font-size: xx-large; text-align: center;">HTML LINK COLORS</h1>
    <hr>
    <h1 style="font-size: xx-large;">Link Colors</h1>
    <p>You can change the default colors of links</p>
    <a href="https://www.w3schools.com/html/html_links_colors.asp" target="_blank">W3 Schools</a>
    <hr>

</body>

</html>
